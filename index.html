<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SecurePass</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🔐 SecurePass</h1>
    <p class="sub">Gerador de Senhas Seguras</p>

    <div class="senha-box">
        <input id="senha" readonly>
        <button id="copiar">Copiar</button>
    </div>

    <div class="opcao">
        <label>Tamanho: <span id="valor">16</span></label>
    </div>

    <input type="range" id="tamanho" min="6" max="50" value="16">

    <div class="opcao">
        <label>Maiúsculas</label>
        <input type="checkbox" id="maiusculas" checked>
    </div>

    <div class="opcao">
        <label>Minúsculas</label>
        <input type="checkbox" id="minusculas" checked>
    </div>

    <div class="opcao">
        <label>Números</label>
        <input type="checkbox" id="numeros" checked>
    </div>

    <div class="opcao">
        <label>Símbolos</label>
        <input type="checkbox" id="simbolos" checked>
    </div>

    <button id="gerar">Gerar Senha</button>

    <div class="forca">
        <p>Força da senha</p>

        <div class="barra">
            <div id="nivel"></div>
        </div>

        <p id="textoForca"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
